# Reference backend spec. The canonical, prefixed spec is generated by deploy.sh
# from config.env (names.sh). Object names and S3 prefixes are namespaced by
# DEPLOY_PREFIX so they never collide on a shared account. Values below show the
# pattern for DEPLOY_PREFIX=<prefix>.
spec:
  containers:
  - name: icechunk-service
    image: /icechunk_db_<prefix>/icechunk/icechunk_repo/icechunk-service:latest
    env:
      ICECHUNK_BUCKET: icechunk-ro
      ICECHUNK_PREFIX: <prefix>/met_office_global
      ICECHUNK_UK_PREFIX: <prefix>/met_office_uk_2km
      AWS_DEFAULT_REGION: us-west-2
    secrets:
    - snowflakeSecret:
        objectName: ICECHUNK_DB_<PREFIX>.ICECHUNK.AWS_ACCESS_KEY_ID
      envVarName: AWS_ACCESS_KEY_ID
    - snowflakeSecret:
        objectName: ICECHUNK_DB_<PREFIX>.ICECHUNK.AWS_SECRET_ACCESS_KEY
      envVarName: AWS_SECRET_ACCESS_KEY
    readinessProbe:
      port: 8080
      path: /health
  endpoints:
  - name: http-endpoint
    port: 8080
    public: false
