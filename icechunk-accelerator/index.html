<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icechunk_logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IceChunk Accelerator</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg:            #0D1117;
      --surface:       #161B22;
      --surface-2:     #1E2A3A;
      --card:          #243447;
      --border:        #2D3F53;
      --text:          #F0F4F8;
      --text-secondary:#8A9BB0;
      --accent:        #29B5E8;
      --accent-hover:  #1DA1D1;
      --accent-dim:    rgba(41,181,232,0.15);
      --green:         #0DB048;
      --yellow:        #E5A100;
      --red:           #E5484D;
      --radius:        8px;
      --shadow:        0 2px 12px rgba(0,0,0,0.4);
    }

    /* ── Reset ────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
    body { background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── App shell ────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: row; height: 100vh; }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    .sidebar {
      width: 220px; min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand img { width: 28px; height: 28px; }
    .sidebar-brand span {
      font-size: 13px; font-weight: 700; color: var(--text);
      line-height: 1.2;
    }
    .sidebar-brand small { display: block; color: var(--text-secondary); font-weight: 400; font-size: 10px; }
    .sidebar-nav { flex: 1; padding: 8px 0; }
    .sidebar-section {
      padding: 16px 16px 4px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-secondary);
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px;
      color: var(--text-secondary);
      text-decoration: none; cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
      font-size: 13px; font-family: inherit;
      border-radius: 0; transition: background 0.1s, color 0.1s;
    }
    .sidebar-link:hover { background: var(--surface-2); color: var(--text); }
    .sidebar-link.active { background: var(--accent-dim); color: var(--accent); }
    .sidebar-link svg { flex-shrink: 0; }
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-secondary);
    }
    .snapshot-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 7px;
      font-size: 10px; color: var(--text-secondary); font-family: monospace;
    }

    /* ── Main content ─────────────────────────────────────────────── */
    .app-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .app-header {
      height: 52px; min-height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
    }
    .app-header h1 { font-size: 15px; font-weight: 600; }
    .app-header-actions { display: flex; align-items: center; gap: 8px; }
    .app-main { flex: 1; overflow: hidden; }
    .app-main.scrollable { overflow-y: auto; padding: 24px; max-width: 1100px; margin: 0 auto; }
    .app-main.full-width { padding: 0; overflow: hidden; }

    /* ── Cards & panels ───────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .panel + .panel { margin-top: 16px; }
    .panel-title {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-secondary);
      margin-bottom: 14px;
    }
    .metric-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .metric-value { font-size: 24px; font-weight: 700; color: var(--accent); }
    .metric-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 500; font-family: inherit;
      cursor: pointer; border: 1px solid transparent;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn.primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn.secondary {
      background: var(--surface-2); color: var(--text);
      border-color: var(--border);
    }
    .btn.secondary:hover:not(:disabled) { background: var(--card); }
    .btn.small { padding: 4px 10px; font-size: 12px; }
    .btn.danger { background: var(--red); color: #fff; }

    /* ── Forms ────────────────────────────────────────────────────── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
    .form-select, .form-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit; font-size: 13px;
      padding: 7px 10px;
      width: 100%;
    }
    .form-select:focus, .form-input:focus {
      outline: none; border-color: var(--accent);
    }
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 4px;
      background: var(--border); border-radius: 2px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }

    /* ── Badges ───────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
    }
    .badge.green { background: rgba(13,176,72,0.15); color: var(--green); }
    .badge.blue  { background: var(--accent-dim);    color: var(--accent); }
    .badge.gray  { background: var(--surface-2);     color: var(--text-secondary); }
    .badge.dim-3d { background: rgba(229,161,0,0.15); color: var(--yellow); }

    /* ── Status dot ───────────────────────────────────────────────── */
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .status-dot.green  { background: var(--green); }
    .status-dot.yellow { background: var(--yellow); }
    .status-dot.red    { background: var(--red); }

    /* ── Map container ────────────────────────────────────────────── */
    .map-outer {
      position: relative; width: 100%; height: 100%;
      background: var(--bg); overflow: hidden;
    }
    .map-canvas-wrap { width: 100%; height: 100%; }

    /* ── Map overlay panels ───────────────────────────────────────── */
    .map-overlay {
      position: absolute; z-index: 10;
      background: rgba(13,17,23,0.9);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .map-overlay.top-left  { top: 12px; left: 12px; width: 220px; max-height: calc(100vh - 30px); overflow-y: auto; }
    .map-overlay.top-right { top: 12px; right: 12px; }
    .map-overlay.bottom-left  { bottom: 32px; left: 12px; }
    .map-overlay.bottom-right { bottom: 32px; right: 12px; }
    .map-overlay.bottom-center {
      bottom: 32px;
      left: 50%; transform: translateX(-50%);
      max-height: calc(65vh);
      overflow-y: auto;
    }
    .overlay-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-secondary);
      margin-bottom: 10px;
    }

    /* ── Height slider ────────────────────────────────────────────── */
    .height-display {
      font-size: 20px; font-weight: 700; color: var(--accent);
      text-align: center; margin: 4px 0;
    }
    .height-display small {
      font-size: 11px; color: var(--text-secondary); font-weight: 400;
    }

    /* ── Color legend ─────────────────────────────────────────────── */
    .color-legend { min-width: 160px; }
    .color-bar {
      height: 10px; border-radius: 5px;
      margin: 6px 0 4px;
    }
    .color-labels {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--text-secondary);
    }

    /* ── BBox panel ───────────────────────────────────────────────── */
    .bbox-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      margin-bottom: 8px;
    }
    .bbox-input-wrap { display: flex; flex-direction: column; gap: 2px; }
    .bbox-label { font-size: 10px; color: var(--text-secondary); }
    .bbox-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px; color: var(--text);
      font-size: 12px; padding: 4px 6px;
      font-family: monospace; width: 100%;
    }

    /* ── Loading ──────────────────────────────────────────────────── */
    .map-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(13,17,23,0.6); z-index: 20;
      pointer-events: none;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Progress bar ─────────────────────────────────────────────── */
    .progress-bar {
      width: 100%; height: 6px;
      background: var(--border); border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    /* ── Tooltip (deck.gl) ────────────────────────────────────────── */
    .deck-tooltip {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 6px !important;
      color: var(--text) !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      padding: 8px 12px !important;
    }

    /* ── Checkbox ─────────────────────────────────────────────────── */
    .checkbox-list { display: flex; flex-direction: column; gap: 6px; }
    .checkbox-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; cursor: pointer; padding: 3px 0;
    }
    .checkbox-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--accent); }
    .checkbox-item .var-size {
      margin-left: auto; font-size: 10px; color: var(--text-secondary);
    }

    /* ── Variable pill list ───────────────────────────────────────── */
    .var-pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .var-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; color: var(--text-secondary);
    }
    .var-pill.is3d { border-color: var(--yellow); color: var(--yellow); }

    /* ── Scrollbar ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
