spec:
  containers:
  - name: icechunk-accelerator
    image: /icechunk_db/icechunk/icechunk_repo/icechunk-accelerator:latest
    env:
      ICECHUNK_SERVICE_URL: http://icechunk-service:8080
    readinessProbe:
      port: 3001
      path: /healthz
  endpoints:
  - name: http-endpoint
    port: 3001
    public: true
